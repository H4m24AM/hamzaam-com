<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travelogue — Hamza AM</title>
  <meta name="description" content="One lens. Unfiltered moments abroad. Travel photography by Hamza AM." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="nav-placeholder"></div>

  <!-- Hero -->
  <section class="travel-hero">
    <div class="travel-hero__bg"></div>
    <div class="travel-hero__overlay"></div>
    <div class="travel-hero__content">
      <span class="label" style="margin-bottom:1rem;">Journal</span>
      <h1 class="travel-hero__title">Travelogue</h1>
      <p class="travel-hero__sub">One lens. Unfiltered moments abroad.</p>
    </div>
  </section>

  <!-- Grid -->
  <section class="travel-grid">
    <div class="travel-grid__inner">

      <div class="travel-item">
        <img src="images/travel-1.jpg" alt="Dubai" loading="lazy" />
        <div class="travel-item__overlay">
          <p class="travel-item__loc">Dubai</p>
          <p class="travel-item__year">UAE · 2023</p>
        </div>
      </div>

      <div class="travel-item">
        <img src="images/travel-2.jpg" alt="London" loading="lazy" />
        <div class="travel-item__overlay">
          <p class="travel-item__loc">London</p>
          <p class="travel-item__year">UK · 2023</p>
        </div>
      </div>

      <div class="travel-item">
        <img src="images/travel-3.jpg" alt="Istanbul" loading="lazy" />
        <div class="travel-item__overlay">
          <p class="travel-item__loc">Istanbul</p>
          <p class="travel-item__year">Turkey · 2022</p>
        </div>
      </div>

      <div class="travel-item">
        <img src="images/travel-4.jpg" alt="Morocco" loading="lazy" />
        <div class="travel-item__overlay">
          <p class="travel-item__loc">Morocco</p>
          <p class="travel-item__year">2022</p>
        </div>
      </div>

      <div class="travel-item">
        <img src="images/travel-5.jpg" alt="Cairo" loading="lazy" />
        <div class="travel-item__overlay">
          <p class="travel-item__loc">Cairo</p>
          <p class="travel-item__year">Egypt · 2022</p>
        </div>
      </div>

      <div class="travel-item">
        <img src="images/travel-6.jpg" alt="Brooklyn" loading="lazy" />
        <div class="travel-item__overlay">
          <p class="travel-item__loc">Brooklyn</p>
          <p class="travel-item__year">NY · 2024</p>
        </div>
      </div>

      <div class="travel-item">
        <img src="images/travel-7.jpg" alt="Travel 7" loading="lazy" />
        <div class="travel-item__overlay">
          <p class="travel-item__loc">Destination</p>
          <p class="travel-item__year">Year</p>
        </div>
      </div>

      <div class="travel-item">
        <img src="images/travel-8.jpg" alt="Travel 8" loading="lazy" />
        <div class="travel-item__overlay">
          <p class="travel-item__loc">Destination</p>
          <p class="travel-item__year">Year</p>
        </div>
      </div>

    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
